{% extends "base.html" %}
{% block title %}Settings - Smart Society{% endblock %}
{% block page_title %}Settings{% endblock %}

{% block content %}
<div class="card form-card">
    <h3 class="card-heading">Account Information</h3>
    <div class="profile-details">
        <div class="profile-item"><span class="profile-label">Username</span><span>{{ current_username }}</span></div>
        <div class="profile-item"><span class="profile-label">Role</span><span>{{ current_role|capitalize }}</span></div>
    </div>
</div>

<div class="card form-card">
    <h3 class="card-heading">Change Password</h3>
    <form method="POST" class="modern-form">
        <div class="form-group">
            <label>Current Password</label>
            <input type="password" name="current_password" required>
        </div>
        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="new_password" required>
        </div>
        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" name="confirm_password" required>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Change Password</button>
        </div>
    </form>
</div>
{% endblock %}
